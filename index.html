<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="PadHook">
    <meta name="theme-color" content="#fafafa" id="themeColorMeta">
    <title>PadHook</title>
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("padhook-theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = saved || (prefersDark ? "dark" : "light");
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="メイン操作">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>PadHook</h1>
            <p>コードとメロディを、iPhoneで素早くスケッチ。</p>
          </div>
        </div>
        <div class="transport">
          <button class="control-button secondary" id="rewindButton" type="button" aria-label="先頭へ戻る">先頭</button>
          <button class="control-button primary" id="playButton" type="button">再生</button>
        </div>
      </header>

      <main class="composer" aria-label="作曲エディタ">
        <section class="control-strip" aria-label="曲の設定">
          <label>
            <span>Key</span>
            <select id="keySelect" aria-label="キー"></select>
          </label>
          <label>
            <span>Scale</span>
            <select id="scaleSelect" aria-label="スケール">
              <option value="major">Major</option>
              <option value="minor">Natural Minor</option>
            </select>
          </label>
          <label>
            <span>BPM</span>
            <input id="tempoInput" type="number" min="50" max="190" step="1" inputmode="numeric" aria-label="テンポ">
          </label>
          <label>
            <span>Meter</span>
            <select id="meterSelect" aria-label="拍子">
              <option value="4">4/4</option>
              <option value="3">3/4</option>
              <option value="6">6/8</option>
            </select>
          </label>
        </section>

        <section class="project-strip" aria-label="プロジェクト操作">
          <button id="demoButton" type="button">例を読み込む</button>
          <button id="undoButton" type="button">Undo</button>
          <button id="redoButton" type="button">Redo</button>
          <button id="newButton" type="button">新規</button>
          <button id="themeButton" type="button" aria-pressed="false">ダーク</button>
        </section>

        <section class="song-status" aria-live="polite">
          <span id="positionStatus">1小節 1拍</span>
          <span id="activeChordStatus">コード未選択</span>
          <span id="guideStatus">安定音: なし</span>
        </section>

        <section class="timeline-panel" aria-label="タイムライン">
          <div class="timeline-head">
            <div>
              <h2>スケッチ</h2>
              <p>タップで位置を選び、下のパレットで入力。</p>
            </div>
            <button id="addMeasureButton" type="button">+ 小節</button>
          </div>
          <div class="timeline-scroll" id="timelineScroll" tabindex="0" aria-label="横スクロール可能な譜面">
            <div class="timeline-surface" id="timelineSurface">
              <div class="ruler" id="ruler" aria-hidden="true"></div>
              <div class="chord-lane" id="chordLane" aria-label="コードレーン"></div>
              <div class="melody-lane" id="melodyLane" aria-label="メロディレーン"></div>
              <div class="cursor-line" id="cursorLine" aria-hidden="true"></div>
              <div class="playhead-line" id="playheadLine" aria-hidden="true"></div>
            </div>
          </div>
        </section>
      </main>

      <section class="dock" aria-label="入力パレット">
        <nav class="mode-tabs" aria-label="編集モード">
          <button class="mode-tab active" data-mode="chords" type="button">コード</button>
          <button class="mode-tab" data-mode="melody" type="button">メロディ</button>
          <button class="mode-tab" data-mode="ideas" type="button">提案</button>
          <button class="mode-tab" data-mode="export" type="button">書き出し</button>
        </nav>
        <div class="dock-panel">
          <div class="panel-page active" id="chordsPanel" data-panel="chords">
            <div class="palette-header">
              <div>
                <h2>コード入力</h2>
                <p>ローマ数字をタップ。選択中の長さで配置します。</p>
              </div>
              <button id="deleteButtonChords" class="danger-button" type="button">削除</button>
            </div>
            <div class="duration-row" id="durationRowChords" aria-label="長さ"></div>
            <div class="degree-grid" id="chordPalette" aria-label="コードパレット"></div>
            <div class="edit-row">
              <button id="extendChordButton" type="button">7th</button>
              <button id="invertChordButton" type="button">転回</button>
              <button id="tieChordButton" type="button">次へ伸ばす</button>
            </div>
          </div>

          <div class="panel-page" id="melodyPanel" data-panel="melody">
            <div class="palette-header">
              <div>
                <h2>メロディ入力</h2>
                <p>安定音は譜面とボタンで強調されます。</p>
              </div>
              <button id="deleteButtonMelody" class="danger-button" type="button">削除</button>
            </div>
            <div class="duration-row" id="durationRowMelody" aria-label="長さ"></div>
            <div class="degree-grid" id="notePalette" aria-label="メロディパレット"></div>
            <div class="edit-row">
              <button id="restButton" type="button">休符</button>
              <button id="lowerNoteButton" type="button">下げる</button>
              <button id="raiseNoteButton" type="button">上げる</button>
              <button id="octaveDownButton" type="button">8va-</button>
              <button id="octaveUpButton" type="button">8va+</button>
            </div>
          </div>

          <div class="panel-page" id="ideasPanel" data-panel="ideas">
            <div class="palette-header">
              <div>
                <h2>次の候補</h2>
                <p>現在位置の前後関係から、使いやすい候補を並べます。</p>
              </div>
              <button id="generateButton" class="primary-action" type="button">4小節生成</button>
            </div>
            <div class="suggestion-list" id="suggestionList" aria-label="コード候補"></div>
            <div class="edit-row">
              <button id="generateMelodyButton" type="button">メロディ補完</button>
              <button id="clearAfterButton" type="button">以降を空に</button>
            </div>
          </div>

          <div class="panel-page" id="exportPanel" data-panel="export">
            <div class="palette-header">
              <div>
                <h2>保存と書き出し</h2>
                <p>ローカル保存、JSON、MIDIでやり取りできます。</p>
              </div>
              <button id="saveButton" class="primary-action" type="button">保存</button>
            </div>
            <div class="export-grid">
              <button id="exportJsonButton" type="button">JSON保存</button>
              <button id="importJsonButton" type="button">JSON読込</button>
              <button id="exportMidiButton" type="button">MIDI保存</button>
              <button id="copySummaryButton" type="button">進行をコピー</button>
            </div>
            <input id="importFileInput" type="file" accept="application/json,.json" hidden>
          </div>
        </div>
      </section>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" defer></script>
  </body>
</html>
